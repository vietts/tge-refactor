# Pages CMS configuration — https://pagescms.org
#
# How to connect:
#   1. Push repo to GitHub
#   2. Go to https://app.pagescms.org, log in with GitHub
#   3. Select this repo → admin is auto-generated from this file
#   4. Editors see structured forms, save triggers a commit → Cloudflare rebuilds
#
# Docs: https://pagescms.org/docs/configuration/

media:
  input: public
  output: /

content:
  - name: hub
    label: Hub (home page)
    type: file
    path: src/content/hub/main/index.yaml
    fields:

      # ── HERO ─────────────────────────────────────────────────────────────────
      - name: manifesto
        label: "Hero manifesto"
        type: object
        fields:
          - { name: kicker,     label: Kicker,                 type: string }
          - { name: serif,      label: "Serif line (above huge)", type: string }
          - { name: huge,       label: "Huge display title",   type: string }
          - { name: cta,        label: "Hero CTA label",       type: string }
          - { name: ctaHref,    label: "Hero CTA href",        type: string }
          - { name: videoSrc,   label: "Hero video (.webm)",   type: string }
          - { name: posterSrc,  label: "Hero video poster",    type: string }

      - name: featured
        label: "Featured event card (above documentary)"
        description: "Card with photo + countdown shown right after the hero. All fields are optional — leave blank to inherit from the selected event."
        type: object
        required: false
        fields:
          - name: eventSlug
            label: "Source event (for fallbacks + CTA link)"
            type: select
            required: false
            options:
              values:
                - { value: auto,     label: "Auto — earliest registration opening" }
                - { value: slovenia, label: "Slovenia" }
                - { value: germany,  label: "Germany" }
                - { value: tuscany,  label: "Tuscany" }
          - { name: kicker,         label: "Kicker override (e.g. 'Next up · Germany 2026')", type: string, required: false }
          - { name: heading,        label: "Heading override (italic quote)",                   type: text,   required: false }
          - { name: body,           label: "Body override (tagline under heading)",             type: text,   required: false }
          - { name: image,          label: "Photo override",                                    type: image,  required: false }
          - { name: imageAlt,       label: "Photo alt text",                                    type: string, required: false }
          - { name: countdownLabel, label: "Countdown label (e.g. 'Opens in')",                 type: string, required: false }
          - { name: dateLabel,      label: "Date label (e.g. 'Registration opens')",            type: string, required: false }
          - { name: targetDate,     label: "Countdown target (ISO 8601) — overrides event date", type: string, required: false }
          - { name: ctaLabel,       label: "CTA label (e.g. 'Join the waitlist')",              type: string, required: false }
          - { name: ctaHref,        label: "CTA link (default: event page #signup)",            type: string, required: false }

      # ── SECTIONS (frontend order) ─────────────────────────────────────────────
      - name: documentary
        label: "Documentary — top"
        type: object
        fields:
          - { name: label,     label: "Kicker",  type: string }
          - { name: title,     label: Title,     type: string }
          - { name: subtitle,  label: Subtitle,  type: text }
          - { name: youtubeId, label: "YouTube ID", type: string }

      - name: whatIs
        label: "What is TGE"
        type: object
        fields:
          - { name: kicker,     label: Kicker,       type: string }
          - { name: title,      label: Title,        type: string }
          - { name: body,       label: Body,         type: text }
          - { name: statNumber, label: "Stat number", type: string }
          - { name: statLabel,  label: "Stat label",  type: string }
          - { name: since,      label: "Since label", type: string }

      - name: threeEscapes
        label: "Three escapes — section head"
        description: "Titolo e sottotitolo della sezione. I dati delle singole card (foto, nome, data, quote, km...) si modificano in Events → Slovenia / Germany / Tuscany."
        type: object
        fields:
          - { name: title,    label: Title,    type: string }
          - { name: subtitle, label: Subtitle, type: string }

      - name: documentarySecondary
        label: "Documentary — bottom (after events)"
        type: object
        fields:
          - { name: label,     label: Kicker,    type: string }
          - { name: title,     label: Title,     type: string }
          - { name: subtitle,  label: Subtitle,  type: text }
          - { name: youtubeId, label: "YouTube ID", type: string }

      - name: signup
        label: "Signup — top (after hero)"
        type: object
        fields:
          - { name: kicker,         label: Kicker,            type: string }
          - { name: title,          label: Title,             type: string }
          - { name: body,           label: Body,              type: text,   required: false }
          - { name: cta,            label: "CTA button label", type: string }
          - { name: legal,          label: "Legal line",      type: text,   required: false }
          - name: benefits
            label: "Benefits (bullet list)"
            description: "Shown above the form. Leave empty to hide."
            type: string
            list: true
            required: false
          - { name: placeholder,    label: "Email placeholder", type: string, required: false }
          - { name: consentLabel,   label: "Consent label (HTML supported, e.g. link to /privacy)", type: text, required: false }
          - { name: successMessage, label: "Success message",   type: text,   required: false }
          - { name: errorMessage,   label: "Error message",     type: text,   required: false }

      - name: registrationOpens
        label: "Registration opens countdown (before Testimonials)"
        type: object
        required: false
        fields:
          - { name: date,         label: "Target date/time (ISO 8601 with timezone)", type: string }
          - { name: kicker,       label: Kicker,   type: string, required: false }
          - { name: title,        label: Title,    type: string }
          - { name: body,         label: Body,     type: text, required: false }
          - { name: ctaLabel,     label: "Button label (before open)",          type: string, required: false }
          - { name: ctaHref,      label: "Button link (before open)",           type: string, required: false }
          - { name: openLabel,    label: "Label when registration is open",     type: string, required: false }
          - { name: openCtaLabel, label: "Button label when open",             type: string, required: false }
          - { name: openCtaHref,  label: "Button link when open (product URL)", type: string, required: false }

      - name: howToRegister
        label: "How to register (after countdown)"
        description: "Short section explaining how registration works + CTA to the registration page. Leave empty for the default copy."
        type: object
        required: false
        fields:
          - { name: kicker,   label: Kicker,                                                       type: string, required: false }
          - { name: title,    label: Title,                                                        type: string }
          - { name: body,     label: "Body paragraphs",                                            type: text, list: true }
          - { name: ctaLabel, label: "CTA label",                                                  type: string }
          - { name: ctaHref,  label: "CTA link (default /the-grand-escape-2026-registrations)",   type: string, required: false }

      - name: testimonials
        label: "Testimonials"
        type: object
        fields:
          - { name: kicker, label: Kicker, type: string }
          - { name: title,  label: Title,  type: string }
          - name: items
            label: Quotes
            type: object
            list: true
            fields:
              - { name: quote,  label: Quote,         type: text }
              - { name: author, label: "Author name", type: string }
              - { name: event,  label: "Event (e.g. Slovenia 2025)", type: string, required: false }

      - name: values
        label: "Values (4 blocks)"
        type: object
        list: true
        fields:
          - { name: number,  label: "Number (01/02/03/04)", type: string }
          - { name: title,   label: Title,                  type: string }
          - { name: body,    label: Body,                   type: text }
          - { name: caption, label: "Image caption",        type: string }
          - { name: image,   label: "Block image",          type: image, required: false }

      - name: origin
        label: "Origin story"
        type: object
        fields:
          - { name: kicker,       label: Kicker,         type: string }
          - { name: imageCaption, label: "Image caption", type: string }
          - { name: title,        label: Title,          type: string }
          - { name: body,         label: "Body paragraphs", type: text, list: true }
          - { name: image,        label: "Origin image", type: image, required: false }

      - name: signupBottom
        label: "Signup — bottom (before footer)"
        type: object
        fields:
          - { name: kicker,         label: Kicker,            type: string }
          - { name: title,          label: Title,             type: string }
          - { name: body,           label: Body,              type: text,   required: false }
          - { name: cta,            label: "CTA button label", type: string }
          - { name: legal,          label: "Legal line",      type: text,   required: false }
          - name: benefits
            label: "Benefits (bullet list)"
            description: "Shown above the form. Leave empty to hide."
            type: string
            list: true
            required: false
          - { name: placeholder,    label: "Email placeholder", type: string, required: false }
          - { name: consentLabel,   label: "Consent label (HTML supported, e.g. link to /privacy)", type: text, required: false }
          - { name: successMessage, label: "Success message",   type: text,   required: false }
          - { name: errorMessage,   label: "Error message",     type: text,   required: false }

      - name: trust
        label: "Trust / Part of"
        type: object
        fields:
          - { name: label, label: Kicker, type: string }
          - name: partners
            label: Partners
            type: object
            list: true
            fields:
              - { name: name,   label: Name, type: string }
              - { name: logo,   label: "Logo path (e.g. /brand/bas-logo.webp)", type: string }
              - { name: isMain, label: "Main partner? (shown larger)", type: boolean, required: false }

      # ── TECNICI ───────────────────────────────────────────────────────────────
      - name: eventSignupTop
        label: "Event signup — top (shared by Slovenia/Germany/Tuscany)"
        description: "Used in each event page after hero. One source of truth for all three events."
        type: object
        required: false
        fields:
          - { name: kicker,         label: Kicker,            type: string }
          - { name: title,          label: Title,             type: string }
          - { name: body,           label: Body,              type: text,   required: false }
          - { name: cta,            label: "CTA button label", type: string }
          - { name: legal,          label: "Legal line",      type: text,   required: false }
          - name: benefits
            label: "Benefits (bullet list)"
            description: "Shown above the form."
            type: string
            list: true
            required: false
          - { name: placeholder,    label: "Email placeholder", type: string, required: false }
          - { name: consentLabel,   label: "Consent label (HTML supported)", type: text, required: false }
          - { name: successMessage, label: "Success message",   type: text,   required: false }
          - { name: errorMessage,   label: "Error message",     type: text,   required: false }

      - name: eventSignupBottom
        label: "Event signup — bottom (shared by Slovenia/Germany/Tuscany)"
        description: "Used in each event page before the footer."
        type: object
        required: false
        fields:
          - { name: kicker,         label: Kicker,            type: string }
          - { name: title,          label: Title,             type: string }
          - { name: body,           label: Body,              type: text,   required: false }
          - { name: cta,            label: "CTA button label", type: string }
          - { name: legal,          label: "Legal line",      type: text,   required: false }
          - name: benefits
            label: "Benefits (bullet list)"
            type: string
            list: true
            required: false
          - { name: placeholder,    label: "Email placeholder", type: string, required: false }
          - { name: consentLabel,   label: "Consent label (HTML supported)", type: text, required: false }
          - { name: successMessage, label: "Success message",   type: text,   required: false }
          - { name: errorMessage,   label: "Error message",     type: text,   required: false }

      - name: sectionOrder
        label: "Section order (drag to reorder — leave empty for default)"
        description: "Add each section once; drag to reorder. Sections you don't add fall back to the default position. Hero stays on top, Trust strip stays at the bottom."
        type: select
        list: true
        required: false
        options:
          values:
            - { value: signupTop,            label: "Signup — top (after hero)" }
            - { value: documentary,          label: "Documentary — top" }
            - { value: whatIs,               label: "What is TGE" }
            - { value: escapes,              label: "Three escapes grid" }
            - { value: documentarySecondary, label: "Documentary — bottom" }
            - { value: countdown,            label: "Registration countdown" }
            - { value: howToRegister,        label: "How to register" }
            - { value: testimonials,         label: "Testimonials" }
            - { value: values,               label: "Values (4 blocks)" }
            - { value: origin,               label: "Origin story" }
            - { value: signupBottom,         label: "Signup — bottom" }

  - name: registrations
    label: Registrations (year pages)
    description: "One file per registration year. Used by /the-grand-escape-2026-registrations (etc). Duplicate the folder to create a new year."
    type: collection
    path: src/content/registrations
    subfolder: true
    filename: index.yaml
    format: yaml
    view:
      fields: [basRegisterUrl, registrationOpenIso]
    fields:
      - { name: basRegisterUrl,       label: "BAS registration URL",                 type: string }
      - { name: basAccountUrl,        label: "BAS my-account URL",                   type: string }
      - { name: registrationOpenIso,  label: "Registration opens at (ISO 8601 with timezone)", type: string }

      - name: hero
        label: "Hero section"
        type: object
        fields:
          - { name: kicker,      label: Kicker,                    type: string }
          - { name: title,       label: Title,                     type: string }
          - { name: lead,        label: "Lead paragraph",          type: text }
          - { name: contactHtml, label: "Contact line (HTML allowed)", type: text, required: false }

      - name: countdown
        label: "Countdown (uses BAS account URL as CTA)"
        type: object
        fields:
          - { name: kicker,       label: Kicker,                                                    type: string, required: false }
          - { name: title,        label: Title,                                                     type: string }
          - { name: body,         label: Body,                                                      type: text,   required: false }
          - { name: ctaLabel,     label: "Button label (before open, e.g. 'Create your BAS account')", type: string, required: false }
          - { name: openLabel,    label: "Label shown when countdown is over",                      type: string, required: false }
          - { name: openCtaLabel, label: "Button label when open (e.g. 'Register now')",           type: string, required: false }
          - { name: accentColor,  label: "Accent hex color",                                        type: string, required: false }

      - name: account
        label: "Account / BAS section"
        type: object
        fields:
          - { name: kicker, label: Kicker, type: string }
          - { name: title,  label: Title,  type: string }
          - name: bodyParagraphs
            label: "Body paragraphs"
            type: text
            list: true
          - { name: ctaAccountLabel,  label: "CTA — create account label", type: string }
          - { name: ctaRegisterLabel, label: "CTA — go to registration label", type: string }
          - { name: supportHtml,      label: "Support line (HTML allowed)", type: text, required: false }

      - name: benefits
        label: "Benefits (what's included)"
        type: object
        fields:
          - { name: kicker, label: Kicker, type: string }
          - { name: title,  label: Title,  type: string }
          - name: items
            label: "Bullet items"
            type: string
            list: true

      - name: pricing
        label: "Pricing cards"
        type: object
        fields:
          - { name: kicker, label: Kicker, type: string }
          - { name: title,  label: Title,  type: string }
          - name: cards
            label: "Price cards"
            type: object
            list: true
            fields:
              - { name: label,       label: "Card label (e.g. Early Bird)", type: string }
              - { name: value,       label: "Price value (e.g. €137)",      type: string }
              - { name: dates,       label: "Dates text",                   type: string }
              - { name: note,        label: "Note under dates",             type: text,    required: false }
              - { name: highlighted, label: "Highlighted (caramel border)", type: boolean, required: false }
          - { name: rulesHtml, label: "Rules line (HTML allowed)", type: text, required: false }

      - name: faq
        label: "FAQ"
        type: object
        fields:
          - { name: kicker,      label: Kicker,           type: string }
          - { name: title,       label: Title,            type: string }
          - { name: accentColor, label: "Accent hex color", type: string, required: false }
          - name: items
            label: "Questions"
            type: object
            list: true
            fields:
              - { name: q, label: Question, type: string }
              - { name: a, label: Answer,   type: text }

      - name: final
        label: "Final CTA section"
        type: object
        fields:
          - { name: title,    label: Title,           type: string }
          - { name: body,     label: Body,            type: text, required: false }
          - { name: ctaLabel, label: "CTA button label", type: string }

  - name: events
    label: Events (sub-LP)
    type: collection
    path: src/content/events
    subfolder: true
    filename: index.mdx
    view:
      fields: [name, dateLabel, status, distanceKm]
    fields:

      # ── HERO ─────────────────────────────────────────────────────────────────
      - { name: name,          label: "Event name",     type: string }
      - { name: country,       label: "Country / region", type: string }
      - { name: date,          label: "Event date",     type: date }
      - { name: dateLabel,     label: "Date label (human-readable)", type: string }
      - { name: distanceKm,    label: "Distance (km)",  type: number }
      - { name: elevationD,    label: "Elevation D+ (m)", type: number }
      - { name: quote,         label: "Short tagline (shown on home event card)", type: string }
      - { name: status,        label: Status,           type: select, options: { values: [open, limited, sold] } }
      - { name: statusLabel,   label: "Status label (e.g. 'Limited spots')", type: string }
      - { name: subBrandColor, label: "Sub-brand hex color (accent)", type: string }
      - { name: cardImage,     label: "Card background image (homepage grid)", type: image, required: false }
      - { name: heroImage,     label: "Hero image",     type: image,  required: false }
      - { name: heroImageAlt,  label: "Hero image alt", type: string, required: false }
      - { name: mascotImage,   label: "Mascot image",   type: image,  required: false }
      - { name: tagline,       label: "Tagline (serif line under hero)", type: string, required: false }
      - { name: eventNumberLabel, label: "Event number label (e.g. 'Event 02')", type: string }
      - name: titleFont
        label: "Title font (per-event display font for H2s)"
        type: select
        options:
          values:
            - { value: germania,  label: "Germania (Germany)" }
            - { value: questrial, label: "Questrial (Slovenia)" }
            - { value: tuscany,   label: "Tuscany" }
      - { name: waitlistCtaLabel, label: "Hero CTA label (e.g. 'Register now' or 'Join the 2027 waitlist')", type: string }
      - { name: heroCtaHref,      label: "Hero CTA link (default: #signup — override for direct registration URL)", type: string, required: false }

      # ── SECTIONS (frontend order) ─────────────────────────────────────────────
      - name: factsBar
        label: "Facts bar (4 cells under hero)"
        type: object
        list: true
        fields:
          - name: icon
            label: Icon
            type: select
            options:
              values:
                - { value: calendar, label: "Calendar (When)" }
                - { value: pin,      label: "Pin (Where)" }
                - { value: loop,     label: "Loop (Format)" }
                - { value: road,     label: "Road (Distance)" }
                - { value: clock,    label: "Clock" }
                - { value: mountain, label: "Mountain" }
          - { name: label, label: "Label (e.g. When)",       type: string }
          - { name: value, label: "Value (e.g. 5 Sep 2026)", type: string }
          - { name: sub,   label: "Sub-line (optional)",     type: string, required: false }

      - name: eventSignupTop
        label: "Signup form — top (overrides hub default)"
        description: "Overrides the hub default. Leave empty to use the hub signup copy."
        type: object
        required: false
        fields:
          - { name: kicker,         label: Kicker,             type: string }
          - { name: title,          label: Title,              type: string }
          - { name: body,           label: Body,               type: text,   required: false }
          - { name: cta,            label: "CTA button label", type: string }
          - { name: legal,          label: "Legal line",       type: text,   required: false }
          - name: benefits
            label: "Benefits (bullet list)"
            type: string
            list: true
            required: false
          - { name: placeholder,    label: "Email placeholder",  type: string, required: false }
          - { name: consentLabel,   label: "Consent label (HTML ok)", type: text, required: false }
          - { name: successMessage, label: "Success message",    type: text,   required: false }
          - { name: errorMessage,   label: "Error message",      type: text,   required: false }

      - name: registrationOpens
        label: "Registration opens countdown"
        type: object
        required: false
        fields:
          - { name: date,         label: "Target date/time (ISO 8601 with timezone)", type: string }
          - { name: kicker,       label: Kicker,   type: string, required: false }
          - { name: title,        label: Title,    type: string }
          - { name: body,         label: Body,     type: text, required: false }
          - { name: ctaLabel,     label: "Button label (before open)",          type: string, required: false }
          - { name: ctaHref,      label: "Button link (before open)",           type: string, required: false }
          - { name: openLabel,    label: "Label when registration is open",     type: string, required: false }
          - { name: openCtaLabel, label: "Button label when open",             type: string, required: false }
          - { name: openCtaHref,  label: "Button link when open (product URL)", type: string, required: false }

      - name: howToRegister
        label: "How to register (after countdown)"
        description: "Short section explaining how registration works + CTA to the registration page. Leave empty for the default copy."
        type: object
        required: false
        fields:
          - { name: kicker,   label: Kicker,                                                       type: string, required: false }
          - { name: title,    label: Title,                                                        type: string }
          - { name: body,     label: "Body paragraphs",                                            type: text, list: true }
          - { name: ctaLabel, label: "CTA label",                                                  type: string }
          - { name: ctaHref,  label: "CTA link (default /the-grand-escape-2026-registrations)",   type: string, required: false }

      - { name: philosophyQuote, label: "Philosophy quote",              type: text,  required: false }
      - { name: philosophyImage, label: "Philosophy section background", type: image, required: false }

      - { name: youtubeId, label: "YouTube ID (e.g. dQw4w9WgXcQ)", type: string, required: false }

      - name: places
        label: "Places you'll cross (bento cells)"
        type: object
        list: true
        required: false
        fields:
          - { name: name,        label: "Place name",  type: string }
          - { name: description, label: Description,   type: text }
          - { name: size,        label: "Cell size",   type: select, options: { values: [sm, md, lg] }, required: false }
          - { name: image,       label: "Cell image",  type: image, required: false }

      - name: routeMap
        label: "Route map & elevation"
        description: "Static map + elevation profile supplied by marketing. Section only renders when this object is filled and added to sectionOrder."
        type: object
        required: false
        fields:
          - { name: title,             label: "Title (e.g. 'Tuscany Loop 2026') — defaults to event name", type: string, required: false }
          - { name: startingPoint,     label: "Starting point (city + venue)", type: string, required: false }
          - { name: km,                label: "Total km (defaults to event distanceKm)", type: number, required: false }
          - { name: elev,              label: "Total climb in m (defaults to event elevationD)", type: number, required: false }
          - { name: mapImage,          label: "Map image (JPG/PNG, 16:9 recommended)", type: image, required: false }
          - { name: mapImageAlt,       label: "Map alt text", type: string, required: false }
          - { name: elevationImage,    label: "Elevation profile image (~32:9)", type: image, required: false }
          - { name: elevationImageAlt, label: "Elevation alt text", type: string, required: false }
          - { name: elevationRange,    label: "Elevation range (e.g. '0 – 1,240 m')", type: string, required: false }
          - { name: mapScale,          label: "Scale / orientation tag (e.g. 'Scale 1:300k')", type: string, required: false }
          - name: tracks
            label: "Track variants (leave empty for single-track events)"
            type: object
            list: true
            required: false
            fields:
              - { name: key,             label: "Key (slug, e.g. 'gran')", type: string }
              - { name: label,           label: "Label (e.g. 'Gran fondo · 600 km')", type: string }
              - { name: km,              label: "Track km", type: number }
              - { name: elev,            label: "Track climb (m)", type: number }
