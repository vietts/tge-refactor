faq:
  kicker: F.A.Q.
  title: Before you register
  accentColor: "#A32C29"
  items:
    - q: Are the spots limited? Can I register later?
      a: Each event has a maximum capacity to preserve the experience quality. You
        cannot register after the deadline.
    - q: How do I register?
      a: Create an account at bikeadventureseries.com so you'll be ready when
        registration opens. Get in the newsletter for updates and direct links.
    - q: What about medical certificates?
      a: You'll need to provide a medical certificate two months before your event.
        We'll send templates and instructions. You don't need it on registration
        day.
    - q: Are all routes on roads?
      a: Yes — all on tarmac, cycle paths, and near-zero traffic secondary roads.
    - q: What bike should I bring?
      a: Road, endurance, or gravel bikes all work perfectly. We recommend 28–35mm
        tires.
    - q: Any time limits or checkpoints?
      a: None. Complete the journey at whatever pace feels right to you.
    - q: Where do I sleep and eat?
      a: Your choice entirely. Hotels, camping, restaurants, or packed meals — plan
        however suits your style.
    - q: What if I'm registered and can't participate?
      a: As per the rules, which you must read before registering, there is no refund,
        partial refund, or transfer of registration to the following year or
        other editions.
    - q: Are the finishing and starting points different?
      a: All routes are loops, so the finish and start are in the same city.
    - q: What about parking? How do we reach the starting points and handle the other
        logistics?
      a: We'll send a detailed guide covering all logistics, on- and off-bike, along
        with an itinerary for your family, partner, or friends waiting for you
        at the starting point.
    - q: Where can I leave the bike box?
      a: The easiest solution is to ask your accommodation in Udine — we'll send a
        list of selected hotels, B&Bs etc.
    - q: I have never done bikepacking — what do I need?
      a: Don't worry — The Grand Escape was the first experience for many. We'll send
        all tips and tricks in the digital guide, and you'll be able to ask
        participants directly in the upcoming forum on Bike Adventure Series.
        Write us at info@thegrandescape.cc for tips!
