whatIs:
  kicker: What is The Grand Escape
  title: Three escapes. Zero KOMs.
  body: "Three road bikepacking events without rankings, time trials, or wanna-be
    pro stuff. Leave the KOMs behind. Ride with your head up, watch the
    landscape go by, and share the road with people who get it: backroads, cycle
    paths, hills and mountain passes across Europe. No social pressure, no race.
    Come as you are."
  statNumber: 3,514
  statLabel: riders who've joined us
  since: Since 2023
