whatIs:
  kicker: What is The Grand Escape
  title: Three escapes. Zero KOMs.
  body: Three road bikepacking events. No rankings, no time trials, no wanna-be
    pro stuff. Ride with your head up, watch the landscape go by, and share the
    road with people who get it. Backroads, cycle paths, hills, mountain passes
    across Europe.
  statNumber: 3,000+
  statLabel: riders who've joined us
  since: Since 2023
threeEscapes:
  title: Three escapes. Three worlds.
  subtitle: Each one has its own color, its own mascot, its own soul.
